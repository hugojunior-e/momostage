<html>

<head>
	<title>Algar ETL</title>
	<link rel="StyleSheet" href="/static/styles/style.css" type="text/css">
	<script type="text/javascript" src="/static/js/functions.js"></script>
	<script type="text/javascript" src="/static/js/tree.js"></script>

	<script type="text/javascript">
		function jsCheckAbort(x) {
			ajax("/info", { "name": "check_abort", "batch_id":x }, function (a) {
				if ( a.status_code == 0 ) {
					ttr = Array.from(id_table_proc.querySelectorAll('a')).filter( eel => eel.innerText.trim() === ("" + x) ) [0];
					ttr.parentNode.parentNode.remove();
				} else {
					alert( a.message );
				}
			}, null);

		}


		function jsImportJob() {
			job_name = prompt('JobName','-');
			if ( job_name != null && job_name != "-" ) {
				ajax("/info", { "name": "importar_job_datastage", "job_name": job_name }, function (a) {
					x = window.open("");
					x.document.body.innerHTML = "<pre>" + a.message + "</pre>";
				}, null);
			}
		}

		function list_process_running() {

			ajax("/info", { "name": "dashboard_index", "sql_pars": [] }, function (a) {
				id_memory.innerHTML = ""
				id_memory.appendChild(to_table(a.memory.data, a.memory.fields));
				id_gauge1.innerHTML = a.memory.gauge1;
				
				id_gauge1.parentElement.style.borderColor = '';
				const cpu_value = parseInt( id_gauge1.getElementsByTagName("H2")[0].innerText );
				if (cpu_value >= 70) {
					id_gauge1.parentElement.style.borderColor = 'orange';
				}
				if (cpu_value >= 100) {
					id_gauge1.parentElement.style.borderColor = 'red';
				}

				id_process_running.innerHTML = "";
				id_process_running.appendChild(to_table(a.process_running.data, a.process_running.fields));				
				id_process_running.querySelectorAll("tr").forEach( (row, index) => {
					if ( index > 0 ) {
						var tipo_cmd = row.cells[5].innerHTML.includes(" ") ? "local": "algar";
						row.cells[6].innerHTML = `<a href=# onclick="jsKillProcess('${ row.cells[0].innerHTML }', '${ tipo_cmd }', '${ row.cells[5].innerHTML }')">kill</a>`;
					}
				});

			
				id_process_aborted.innerHTML = "";
				id_process_aborted.appendChild(to_table(a.process_aborted.data, a.process_aborted.fields));				
				id_process_aborted.querySelectorAll("table")[0].id = 'id_table_proc';

				id_process_aborted.querySelectorAll("tr").forEach( (row, index) => {
					
					if ( index > 0 ) {
						if (row.cells[4].innerHTML != "ALGARSCHEDULER") {
							row.cells[1].innerHTML = '<a href="/designer?job_name=' + row.cells[1].innerHTML + '" target=__blank>' + row.cells[1].innerHTML + '</a>';
						}

						const td_check = document.createElement("td");
						td_check.textContent = "-";
						row.appendChild(td_check);						

						if (row.cells[0].innerHTML == "A") {
							td_check.innerHTML = '<a href=# onclick=jsCheckAbort(' + row.cells[2].innerHTML + ')>check</a>';
						}

						row.cells[2].innerHTML = '<a href=/logger?batch_id=' + row.cells[2].innerHTML + ' target=logger_' +  row.cells[2].innerHTML + '>' + row.cells[2].innerHTML + '</a>';
						if (row.cells[0].innerHTML == "F") row.cells[0].innerHTML = ICO_OK;
						if (row.cells[0].innerHTML == "A") row.cells[0].innerHTML = ICO_ERROR;
						if (row.cells[0].innerHTML == "E") row.cells[0].innerHTML = ICO_RUNNING;
						if (row.cells[0].innerHTML == "K") row.cells[0].innerHTML = ICO_WARNING;
						if (row.cells[0].innerHTML == "W") row.cells[0].innerHTML = ICO_WAIT;
					}
				});	
			}, null);
		}


		function jsClearAppTemp() {
			alert("em construção");
		}


		function jsKillProcess(pid, tipo_cmd, cmd) {
			if (confirm("Are you sure you want to kill the process " + pid + " ?")) {
				ajax("/info", { "name": "kill_process", "pid": pid, "tipo_cmd": tipo_cmd, "cmd": cmd }, function (a) {
					alert(a.message);
				}, null);
			}

		}

		function list_tree_view() {
				ajax("/info", { "name": "result_set", "sql": "job_treeview", "sql_pars": []  }, function (a) {
					const resultado = a.data.map(linha => linha[0]).join("\n");
					ret = window.treeview.montaArvoreDados(resultado);
					id_treeview.innerHTML = ret;

				}, null);
		}

		function js_open_job(x) {
			aa = x.split("...")
			window.open("/designer?job_name=" + aa[ aa.length - 2 ]);
		}

		function jsFindJob(jb) {
		  id = document.getElementById('id_no_' + jb.toLowerCase() + '...' );
		  x  = id.parentNode;

		  while (x.id != 'id_treeview' ) {
			oc( x.id.substring(3) , 1 )
			x = x.parentNode;
		  }

		  id_job_find.style.display = 'none';
		}

		function js_delete_job(job_name) {
			if (confirm("Are you sure you want to delete the job " + job_name + " ?")) {
				ajax("/info", { "name": "delete_job", "job_name": job_name }, function (a) {
					alert(a.message);
					jsFindJobList();
				}, null);
			}
		}

		function jsFindJobList() {
			ajax("/info", { "name": "result_set", "sql": "job_find_all_jobs", "sql_pars": [ id_job_find_name.value ] }, function (a) {
				id_job_find_list.innerHTML = "";
				id_job_find_list.appendChild(to_table(a.data, a.fields));				

				id_job_find_list.querySelectorAll("tr").forEach((e, idx) => {
					if (idx > 0) {
						e.cells[0].value      = e.cells[0].innerHTML;
						e.cells[0].innerHTML  = "<a href=# onclick=js_open_job('" + e.cells[0].innerHTML + "...') >" + e.cells[0].innerHTML + "</a>";

						e.cells[4].innerHTML  = "<a href=# onclick=js_delete_job('" + e.cells[0].value + "') >🗑️</a>";
					}
				});

			}, null);
		}
	</SCRIPT>
</head>

<body>
	<div class="menu">
		<button onclick="window.location.reload()">Reload Repository</button> &nbsp;
		<button onclick="window.open('/designer?job_name=newjob')">Create new Job</button> &nbsp;
		<button onclick="window.open('/globals')">Parameters Globals</button> &nbsp;
		<button onclick="window.open('/sequences')">Sequences</button> &nbsp;
		<button onclick="jsImportJob()">Import ODS</button> &nbsp;

		<div id="id_title_page" class="titles_toolbar" style="cursor: pointer" onclick="window.open('/logout')">Logout:
			{{ login }}</div>
	</div>


	<div class="container">
		<div class="div-esquerda">
			<div class="sidebar" id="id_treeview"></div>
			<center><a href="#" onclick="id_job_find.style.display = 'block'"> Find Job </a></center>
		</div>

		<div class="div-direita">
			<div class="area">
				<span class="titulo">Memory|Disk|CPU</span>
				<div class="div_pre">
					<table width="80%">
						<tr>
							<td id="id_memory"></td>
							<td width="5">
								<div class="gauge" {cpu_background}>
									<div class="gauge-content" id="id_gauge1">
									</div>
								</div>
							</td>
						</tr>
					</table>
				</div>
				<br>
		
				<span class="titulo">Process Running Now (SO)</span>
				<div class="div_pre" id="id_process_running"></div>
				<br>

				<span class="titulo">Monitor Process (Timeled) </span>
				<div class="div_pre" id="id_process_aborted"></div>
			</div>

		</div>

	</div>


    <div id="id_job_find" class="itools_modal">
        <div class="itools_modal_content">
			<span class="itools_modal_close" onclick="this.parentElement.parentElement.style.display='none'">&times;</span>
			<h2>Job Find</h2>
			<input type=text id=id_job_find_name oninput=jsFindJobList()>
			<hr>
			<div class="div_pre" id="id_job_find_list"></div>
        </div>
    </div>


	<script>
		window.treeview = new TreeView();
		window.treeview.endNodeClick = "js_open_job";
		window.treeview.endNodeParamClick = "nodeValues[3]";

		list_process_running();
		list_tree_view();
		setInterval(list_process_running, 30000);
	</script>
</body>

</html>
